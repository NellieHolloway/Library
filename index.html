}

function renderBookPickerResults(query){
  const results = document.getElementById('logBookResults');
  const q = (query || '').trim().toLowerCase();
  if(!q){
    // Show recently active books when input is empty
    const recent = state.books
      .slice()
      .sort((a, b) => {
        // Prioritize Reading, then most recent activity
        const score = x => {
          if(x.status === 'reading') return 3;
          if(x.status === 'want') return 2;
          return 1;
        };
        return score(b) - score(a);
      })
      .slice(0, 6);
    if(recent.length === 0){
      results.innerHTML = `<div class="bp-empty">Library is empty.</div>`;
    } else {
      results.innerHTML = recent.map(b => `
        <div class="book-picker-result" data-book-id="${b.id}">
          <div class="bp-title">${escapeHtml(b.title)}</div>
          <div class="bp-author">${escapeHtml((b.authors||[]).join(', ') || 'Unknown')} · ${escapeHtml(b.status)}</div>
        </div>`).join('');
    }
    results.classList.add('open');
    wireBookPickerClicks();
    return;
  }
  const matches = state.books.filter(b => {
    const hay = (b.title + ' ' + (b.authors||[]).join(' ')).toLowerCase();
    return hay.includes(q);
  }).slice(0, 10);

  if(matches.length === 0){
    results.innerHTML = `<div class="bp-empty">No matches. Use ＋ Add to bring in a new book first.</div>`;
  } else {
    results.innerHTML = matches.map(b => `
      <div class="book-picker-result" data-book-id="${b.id}">
        <div class="bp-title">${escapeHtml(b.title)}</div>
        <div class="bp-author">${escapeHtml((b.authors||[]).join(', ') || 'Unknown')}</div>
      </div>`).join('');
  }
  results.classList.add('open');
  wireBookPickerClicks();
}

function wireBookPickerClicks(){
  document.querySelectorAll('#logBookResults .book-picker-result').forEach(el => {
    el.addEventListener('click', () => {
      const b = findBook(el.dataset.bookId);
      if(b){
        state.logSelectedBookId = b.id;
        document.getElementById('logBookInput').value = b.title;
        document.getElementById('logBookResults').classList.remove('open');
        document.getElementById('logProgress').focus();
      }
    });
  });
}

function submitLog(){
  if(!state.logSelectedBookId){
    return toast('Pick a book first', 'error');
  }
  const date = document.getElementById('logDate').value;
  const progress = document.getElementById('logProgress').value.trim();
  const note = document.getElementById('logNote').value.trim();
  const isFinished = document.getElementById('logFinished').checked;

  if(!date) return toast('Date required', 'error');

  addSession(state.logSelectedBookId, {date, progress, note});
  if(isFinished){
    const b = findBook(state.logSelectedBookId);
    if(b){
      b.status = 'finished';
      if(!b.dateStarted) b.dateStarted = date;
      b.dateFinished = date;
      save();
    }
  }

  closeLog();
  renderAll();
  toast(isFinished ? 'Logged & finished' : 'Logged', 'success');
}

function attachDetailHandlers(){
  const panel = document.getElementById('detailPanel');
  const id = state.selectedBookId;
  if(!id) return;

  panel.querySelectorAll('[data-close-detail]').forEach(el =>
    el.addEventListener('click', closeDetail));

  panel.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      setStatus(id, btn.dataset.status);
      openDetail(id);
      renderAll();
      toast(`Marked ${btn.dataset.status}`, 'success');
    });
  });

  panel.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('change', () => {
      const v = el.value;
      updateBook(id, { [el.dataset.field]: v || null });
      renderAll();
    });
    if(el.tagName === 'TEXTAREA'){
      el.addEventListener('blur', () => {
        updateBook(id, { notes: el.value });
        renderAll();
      });
    }
  });

  panel.querySelectorAll('.star').forEach(s =>
    s.addEventListener('click', () => {
      updateBook(id, { rating: parseInt(s.dataset.rating) });
      openDetail(id);
    }));

  const clearStar = panel.querySelector('[data-rating-clear]');
  if(clearStar) clearStar.addEventListener('click', () => {
    updateBook(id, { rating: null });
    openDetail(id);
  });

  panel.querySelectorAll('[data-session-del]').forEach(b =>
    b.addEventListener('click', () => {
      deleteSession(id, parseInt(b.dataset.sessionDel));
      openDetail(id);
      renderAll();
    }));

  const addSessBtn = panel.querySelector('#addSessionBtn');
  if(addSessBtn) addSessBtn.addEventListener('click', () => {
    const date = panel.querySelector('#newSessionDate').value;
    const progress = panel.querySelector('#newSessionProgress').value.trim();
    const note = panel.querySelector('#newSessionNote').value.trim();
    if(!date) return toast('Date required', 'error');
    addSession(id, { date, progress, note });
    openDetail(id);
    renderAll();
    toast('Session logged', 'success');
  });

  const delBtn = panel.querySelector('#deleteBookBtn');
  if(delBtn) delBtn.addEventListener('click', () => {
    const b = findBook(id);
    if(!b) return;
    if(confirm(`Remove "${b.title}" from your library?`)){
      deleteBook(id);
      closeDetail();
      renderAll();
      toast('Removed');
    }
  });
}

function setSource(src){

async function performLookup(){
  const q = document.getElementById('lookupInput').value.trim();
  if(!q) return;
  const root = document.getElementById('lookupResults');
  root.innerHTML = `<div class="search-state"><span class="spinner"></span> Searching the stacks…</div>`;
  state.lookupBusy = true;
  try{
    let results = [];
    if(state.source === 'openlibrary') results = await searchOpenLibrary(q);
    else if(state.source === 'anilist') results = await searchAniList(q);
    else if(state.source === 'vndb') results = await searchVNDB(q);
    state.lookupResults = results;
    renderLookupResults();
  }catch(e){
    console.error(e);
    root.innerHTML = `<div class="search-state" style="color:var(--danger)">Search failed. ${escapeHtml(e.message)}<br><small style="color:var(--text-3);font-style:normal;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase">If running from a local file, try serving over http://</small></div>`;
  } finally {
    state.lookupBusy = false;
  }
}

function renderLookupResults(){
  const root = document.getElementById('lookupResults');
  if(state.lookupResults.length === 0){
    root.innerHTML = `<div class="search-state">No matches found.</div>`;
    return;
  }
  root.innerHTML = state.lookupResults.map((r, i) => {
    const authors = (r.authors || []).join(', ') || '—';
    const detail = [r.year, r.type, r.pageCount].filter(Boolean).join(' · ');
    const titleShort = escapeHtml((r.title || '?').slice(0, 30));
    const fallback = `<div class="cover-fallback" style="font-size:9px">${titleShort}</div>`;
    const cover = r.coverUrl
      ? fallback + `<img src="${escapeHtml(r.coverUrl)}" alt="" loading="lazy" onerror="this.remove()">`
      : fallback;
    return `
      <div class="result">
        <div class="cover">${cover}</div>
        <div class="result-info">
          <div class="result-title">${escapeHtml(r.title)}</div>
          <div class="result-meta">${escapeHtml(authors)}</div>
          ${detail ? `<div class="result-detail">${escapeHtml(detail)}</div>` : ''}
        </div>
        <button class="add-btn" data-add-idx="${i}">＋ Add</button>
      </div>`;
  }).join('');
  root.querySelectorAll('[data-add-idx]').forEach(b =>
    b.addEventListener('click', () => {
      const idx = parseInt(b.dataset.addIdx);
      const seed = state.lookupResults[idx];
      // Check for duplicates by source+id or title+author
      const dup = state.books.find(x =>
        (seed.sourceId && x.sourceId === seed.sourceId) ||
        (x.title.toLowerCase() === seed.title.toLowerCase() &&
         (x.authors||[]).join(',').toLowerCase() === (seed.authors||[]).join(',').toLowerCase())
      );
      if(dup){
        toast('Already in library', 'error');
        return;
      }
      addBook(seed, 'want');
      b.textContent = '✓ Added';
      b.classList.add('added');
      renderAll();
    }));
}

function manualAdd(){
  const title = document.getElementById('m-title').value.trim();
  if(!title) return toast('Title required', 'error');
  const authors = document.getElementById('m-author').value.split(',').map(s=>s.trim()).filter(Boolean);
  const seed = {
    title,
    authors,
    type: document.getElementById('m-type').value,
    year: parseInt(document.getElementById('m-year').value) || null,
    pageCount: document.getElementById('m-pages').value.trim() || null,
    coverUrl: document.getElementById('m-cover').value.trim() || null,
    description: document.getElementById('m-desc').value.trim(),
    source: 'manual',
  };
  addBook(seed, 'want');
  // Reset form
  ['m-title','m-author','m-year','m-pages','m-cover','m-desc'].forEach(id =>
    document.getElementById(id).value = '');
  closeAdd();
  renderAll();
  toast('Added', 'success');
}

   IMPORT / EXPORT
   ============================================================ */
async function saveBlobToFile(blob, suggestedName, fileTypes){
  // Modern path: showSaveFilePicker — user picks the real location.
  if(window.showSaveFilePicker){
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: fileTypes,
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return true;
    }catch(e){
      if(e.name === 'AbortError') return false; // user cancelled
      console.warn('showSaveFilePicker failed, falling back', e);
    }
  }
  // Fallback: classic download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = suggestedName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  return true;
}

async function exportJSON(){
  const blob = new Blob([JSON.stringify({
    version: 1,
    exportedAt: new Date().toISOString(),
    books: state.books,
  }, null, 2)], {type:'application/json'});
  const ok = await saveBlobToFile(blob, `library_${todayISO()}.json`, [{
    description: 'Library JSON backup',
    accept: {'application/json': ['.json']},
  }]);
  if(ok) toast('Exported', 'success');
}

async function exportCSV(){
  const rows = [
    ['title','authors','type','year','status','dateAdded','dateStarted','dateFinished','rating','pageCount','publisher','isbn','notes','tags','source'],
    ...state.books.map(b => [
      b.title,
      (b.authors||[]).join('; '),
      b.type || '',
      b.year || '',
      b.status,
      b.dateAdded || '',
      b.dateStarted || '',
      b.dateFinished || '',
      b.rating || '',
      b.pageCount || '',
      b.publisher || '',
      b.isbn || '',
      (b.notes || '').replace(/\n/g,' '),
      (b.tags||[]).join('; '),
      b.source || '',
    ])
  ];
  const csv = rows.map(r => r.map(c => {
    const s = String(c ?? '');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const ok = await saveBlobToFile(blob, `library_${todayISO()}.csv`, [{
    description: 'CSV spreadsheet',
    accept: {'text/csv': ['.csv']},
  }]);
  if(ok) toast('Exported CSV', 'success');
}

async function pickAndImportJSON(){
  // Modern: showOpenFilePicker
  if(window.showOpenFilePicker){
    try{
      const [handle] = await window.showOpenFilePicker({
        types: [{description:'Library JSON', accept:{'application/json':['.json']}}],
        excludeAcceptAllOption: false,
        multiple: false,
      });
      const file = await handle.getFile();
      importJSON(file);
      return;
    }catch(e){
      if(e.name === 'AbortError') return;
      console.warn('showOpenFilePicker failed, falling back', e);
    }
  }
  // Fallback: trigger the hidden file input
  document.getElementById('importFile').click();
}

function importJSON(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      const incoming = Array.isArray(data) ? data : (data.books || []);
      if(!Array.isArray(incoming)) throw new Error('Bad format');

      const merge = confirm(`Found ${incoming.length} books. OK to merge with existing library, Cancel to replace.`);
      if(merge){
        const existingIds = new Set(state.books.map(b => b.id));
        const existingKeys = new Set(state.books.map(b =>
          (b.title || '').toLowerCase() + '|' + ((b.authors||[]).join(',').toLowerCase())));
        let added = 0;
        incoming.forEach(b => {
          if(existingIds.has(b.id)) return;
          const k = (b.title || '').toLowerCase() + '|' + ((b.authors||[]).join(',').toLowerCase());
          if(existingKeys.has(k)) return;
          if(!b.id) b.id = uuid();
          if(!b.dateAdded) b.dateAdded = todayISO();
          if(!b.status) b.status = 'want';
          if(!b.sessions) b.sessions = [];
          state.books.push(b);
          added++;
        });
        toast(`Merged ${added} new books`, 'success');
      } else {
        state.books = incoming.map(b => ({
          id: b.id || uuid(),
          dateAdded: b.dateAdded || todayISO(),
          status: b.status || 'want',
          sessions: b.sessions || [],
          ...b,
        }));
        toast(`Replaced with ${state.books.length} books`, 'success');
      }
      save();
      renderAll();
    }catch(err){
      toast('Import failed: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
/* ============================================================
   PWA: service worker, install prompt, URL actions
   ============================================================ */
let deferredInstallPrompt = null;
const INSTALL_DISMISS_KEY = 'library.installDismissed';

async function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  // Service workers only work over http(s), not file://
  if(location.protocol === 'file:') return;

  // Probe for sw.js before registering. When the HTML is viewed standalone
  // (Claude artifact preview, single-file copy, etc.) without its supporting
  // PWA files, we silently degrade to non-PWA mode rather than emit a noisy
  // registration error.
  try{
    const probe = await fetch('sw.js', {method:'HEAD', cache:'no-store'});
    if(!probe.ok) return;
  }catch{
    return;
  }

  navigator.serviceWorker.register('sw.js').then(reg => {
    // When a new SW is found, show the update toast on activation
    reg.addEventListener('updatefound', () => {
      const installing = reg.installing;
      if(!installing) return;
      installing.addEventListener('statechange', () => {
        if(installing.state === 'installed' && navigator.serviceWorker.controller){
          // A new version is ready and we already have an old one
          showUpdateToast(reg);
        }
      });
    });
  }).catch(() => {/* silent: degrade to non-PWA mode */});

  // Reload once when the new SW takes control
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(refreshing) return;
    refreshing = true;
    location.reload();
  });
}

function showUpdateToast(reg){
  const t = document.getElementById('updateToast');
  t.classList.add('show');
  document.getElementById('updateBtn').onclick = () => {
    if(reg.waiting){
      reg.waiting.postMessage({type:'SKIP_WAITING'});
    } else {
      location.reload();
    }
  };
}

function setupInstallPrompt(){
  // Already running as installed PWA? Don't show.
  if(window.matchMedia('(display-mode: standalone)').matches ||
     window.navigator.standalone === true){
    return;
  }
  // Previously dismissed?
  if(localStorage.getItem(INSTALL_DISMISS_KEY)) return;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
    if(outcome === 'accepted'){
      toast('Welcome to your Library', 'success');
    }
  });

  document.getElementById('installDismiss').addEventListener('click', () => {
    document.getElementById('installBanner').classList.remove('show');
    localStorage.setItem(INSTALL_DISMISS_KEY, '1');
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
    deferredInstallPrompt = null;
    toast('Installed', 'success');
  });
}

function handleUrlAction(){
  // Manifest shortcuts pass ?action=log or ?action=add
  const params = new URLSearchParams(location.search);
  const action = params.get('action');
  if(action === 'log'){
    setTimeout(() => openLog(), 200);
  } else if(action === 'add'){
    setTimeout(() => openAdd(), 200);
  }
  // Clean URL so refreshes don't repeat the action
  if(action){
    history.replaceState({}, '', location.pathname);
  }
}

function init(){

  load();

  // Header / search
  document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value;
    renderAll();
  });

  document.getElementById('addBtn').addEventListener('click', openAdd);
  document.getElementById('logBtn').addEventListener('click', openLog);

  // View toggle
  document.querySelectorAll('.view-btn').forEach(b =>
    b.addEventListener('click', () => setView(b.dataset.view)));

  // Status filter
  document.getElementById('statusFilter').addEventListener('click', e => {
    const btn = e.target.closest('.chip');
    if(!btn) return;
    state.filter = btn.dataset.filter;
    document.querySelectorAll('#statusFilter .chip').forEach(c =>
      c.classList.toggle('active', c === btn));
    renderAll();
  });

  // Type filter
  document.getElementById('typeFilter').addEventListener('click', e => {
    const btn = e.target.closest('.chip');
    if(!btn) return;
    state.typeFilter = btn.dataset.type;
    document.querySelectorAll('#typeFilter .chip').forEach(c =>
      c.classList.toggle('active', c === btn));
    renderAll();
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', e => {
    state.sort = e.target.value;
    renderAll();
  });

  // Library clicks
  document.getElementById('library').addEventListener('click', e => {
    const row = e.target.closest('.book');
    if(row) openDetail(row.dataset.id);
  });

  // Modals
  document.querySelectorAll('[data-close]').forEach(b =>
    b.addEventListener('click', () => {
      document.getElementById(b.dataset.close).classList.remove('open');
    }));

  document.getElementById('addOverlay').addEventListener('click', e => {
    if(e.target.id === 'addOverlay') closeAdd();
  });

  document.getElementById('logOverlay').addEventListener('click', e => {
    if(e.target.id === 'logOverlay') closeLog();
  });

  // Quick-log book picker
  const logInput = document.getElementById('logBookInput');
  logInput.addEventListener('input', () => {
    state.logSelectedBookId = null;
    renderBookPickerResults(logInput.value);
  });
  logInput.addEventListener('focus', () => {
    renderBookPickerResults(logInput.value);
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('.book-picker')){
      const r = document.getElementById('logBookResults');
      if(r) r.classList.remove('open');
    }
  });
  document.getElementById('logSubmitBtn').addEventListener('click', submitLog);

  // Enter in progress field submits the log form
  ['logProgress','logNote'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' && (e.ctrlKey || e.metaKey || el.tagName !== 'TEXTAREA')){
        e.preventDefault();
        submitLog();
      }
    });
  });

  // Source tabs
  document.getElementById('sourceTabs').addEventListener('click', e => {
    const t = e.target.closest('.source-tab');
    if(t) setSource(t.dataset.source);
  });

  // Lookup
  document.getElementById('lookupBtn').addEventListener('click', performLookup);
  document.getElementById('lookupInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') performLookup();
  });

  // Manual add
  document.getElementById('manualAddBtn').addEventListener('click', manualAdd);

  // Menu
  const menuBtn = document.getElementById('menuBtn');
  const menuPopup = document.getElementById('menuPopup');
  menuBtn.addEventListener('click', e => {
    e.stopPropagation();
    menuPopup.classList.toggle('open');
  });
  document.addEventListener('click', () => menuPopup.classList.remove('open'));
  menuPopup.addEventListener('click', e => {
    const item = e.target.closest('.menu-item');
    if(!item) return;
    menuPopup.classList.remove('open');
    const action = item.dataset.action;
    if(action === 'export') exportJSON();
    else if(action === 'csv') exportCSV();
    else if(action === 'import') pickAndImportJSON();
    else if(action === 'clear'){
      if(confirm('Permanently clear ALL books from your library? Export first if you want a backup.')){
        state.books = [];
        save(); renderAll(); toast('Library cleared');
      }
    }
  });

  document.getElementById('importFile').addEventListener('change', e => {
    if(e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value = '';
  });

  // Esc to close
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape'){
      const ov = document.getElementById('addOverlay');
      const lo = document.getElementById('logOverlay');
      if(ov.classList.contains('open')) closeAdd();
      else if(lo.classList.contains('open')) closeLog();
      else if(state.selectedBookId) closeDetail();
    }
    // / focuses search
    if(e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA'){
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  renderAll();

  // PWA bootstrapping
  registerServiceWorker();
  setupInstallPrompt();
  handleUrlAction();
}

init();
</script>
